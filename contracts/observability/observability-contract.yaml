apiVersion: observability.platform/v1
kind: ObservabilityContract
metadata:
  name: order-satellite-demo
  owner: demo-team
  system: order-processing-system
  environment: dev
  labels:
    app: order-satellite
    demo: micronaut-observability
spec:
  service:
    name: order-satellite-service
    runtime: jvm
    language: java
    framework: micronaut
    tier: "3"
    lifecycle: experimental

  delivery:
    mode: adopt
    target: aws
    region: us-east-1

  telemetry:
    openTelemetry:
      enabled: true
      semanticConventions: stable
      propagators:
        - tracecontext
        - baggage
      sampling:
        strategy: parentbased_traceidratio
        ratio: 0.5

    resourceAttributes:
      service.name: order-satellite-service
      service.namespace: observability-demo
      service.version: "1.0.0"
      deployment.environment: dev

    signals:
      traces:
        enabled: true
        backendClass: aws-xray
        ingestion: direct
      metrics:
        enabled: true
        backendClass: aws-cloudwatch
        ingestion: direct
      logs:
        enabled: true
        backendClass: cloudwatch-logs
        ingestion: direct

  capabilities:
    dashboards:
      enabled: true
      preset: micronaut-order-dashboard
    alerts:
      enabled: true
      rules:
        - name: high-order-failure-rate
          summary: Alta tasa de fallos en creacion de ordenes
          severity: high
          condition: rate(orders.created.total{status="error"}[5m]) > 0.1
          for: 5m
    slos:
      enabled: false
    dataManagement:
      retention:
        tracesDays: 7
        metricsDays: 30
        logsDays: 30
      dataClassification: internal
