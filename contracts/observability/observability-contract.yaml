apiVersion: observability.platform/v1alpha1
kind: ObservabilityContract
metadata:
  name: order-satellite-demo
  owner: demo-team
  system: order-processing-system
  environment: dev
  labels:
    app: order-satellite
    demo: micronaut-observability
spec:
  service:
    name: order-satellite-service
    runtime: jvm
    language: java
    framework: micronaut
    tier: "3"
    lifecycle: experimental

  delivery:
    mode: adopt
    target: aws
    region: us-east-1

  telemetry:
    openTelemetry:
      enabled: true
      semanticConventions: stable
      propagators:
        - tracecontext
        - baggage
      sampling:
        strategy: parentbased_traceidratio
        ratio: 0.5

    resourceAttributes:
      service.name: order-satellite-service
      service.namespace: observability-demo
      service.version: "1.0.0"
      deployment.environment: dev

    signals:
      traces:
        enabled: true
        backendClass: aws-xray
        ingestion: direct
      metrics:
        enabled: true
        backendClass: aws-cloudwatch
        ingestion: direct
        catalog:
          - name: InboundRequestCount
            type: counter
            unit: "{request}"
            description: Total inbound HTTP requests handled by the service.
            dimensions: [http.route, http.request.method, http.response.status_code]
          - name: InboundRequestDuration
            type: histogram
            unit: ms
            description: End-to-end inbound HTTP request latency, emitted as a histogram so dashboards can derive p95 and p99.
            dimensions: [http.route, http.request.method, http.response.status_code]
          - name: InboundRequestErrors
            type: counter
            unit: "{error}"
            description: Inbound HTTP requests that completed with server-side failure conditions.
            dimensions: [http.route, http.request.method, http.response.status_code]
          - name: OutboundDependencyCallCount
            type: counter
            unit: "{call}"
            description: Total outbound calls from the service to the order API dependency.
            dimensions: [dependency.name, dependency.operation, result]
          - name: OutboundDependencyCallDuration
            type: histogram
            unit: ms
            description: Outbound dependency call latency for the order API.
            dimensions: [dependency.name, dependency.operation]
          - name: OutboundDependencyCallErrors
            type: counter
            unit: "{error}"
            description: Outbound dependency calls that ended in failure.
            dimensions: [dependency.name, dependency.operation]
      logs:
        enabled: true
        backendClass: cloudwatch-logs
        ingestion: direct

  capabilities:
    dashboards:
      enabled: true
      preset: distributed-service
    alerts:
      enabled: true
      rules:
        - name: high-order-failure-rate
          summary: Alta tasa de fallos en creacion de ordenes
          severity: high
          condition: rate(InboundRequestErrors[5m]) > 0.1
          for: 5m
    slos:
      enabled: false
    dataManagement:
      retention:
        tracesDays: 7
        metricsDays: 30
        logsDays: 30
      dataClassification: internal
