apiVersion: observability.platform/v1alpha1
kind: ObservabilityContract
metadata:
  name: order-satellite-demo
  owner: demo-team
  system: order-processing-system
  environment: dev
  labels:
    app: order-satellite
    demo: micronaut-observability
spec:
  service:
    name: order-satellite-service
    runtime: jvm
    language: java
    framework: micronaut
    tier: "3"
    lifecycle: experimental

  delivery:
    mode: adopt
    target: aws
    region: us-east-1

  telemetry:
    openTelemetry:
      enabled: true
      semanticConventions: stable
      propagators:
        - tracecontext
        - baggage
      sampling:
        strategy: parentbased_traceidratio
        ratio: 0.5

    resourceAttributes:
      service.name: order-satellite-service
      service.namespace: observability-demo
      service.version: "1.0.0"
      deployment.environment: dev

    signals:
      traces:
        enabled: true
        backendClass: aws-xray
        ingestion: collector
      metrics:
        enabled: true
        backendClass: aws-cloudwatch
        ingestion: collector
        catalog:
          - name: http.server.request.duration
            type: histogram
            unit: s
            description: HTTP server request duration emitted by OpenTelemetry instrumentation.
            dimensions: [http.route, http.request.method, http.response.status_code]
          - name: http.client.request.duration
            type: histogram
            unit: s
            description: HTTP client request duration emitted by OpenTelemetry instrumentation.
            dimensions: [server.address, http.request.method, http.response.status_code]
      logs:
        enabled: true
        backendClass: cloudwatch-logs
        ingestion: collector

  capabilities:
    dashboards:
      enabled: true
      preset: monolith-business-app
    alerts:
      enabled: true
      rules:
        - name: high-order-failure-rate
          summary: Alta tasa de fallos en creacion de ordenes
          severity: high
          condition: sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])) > 0.1
          for: 5m
    slos:
      enabled: false
    dataManagement:
      retention:
        tracesDays: 7
        metricsDays: 30
        logsDays: 30
      dataClassification: internal
