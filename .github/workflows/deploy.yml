name: Deploy
run-name: ${{ format('Deploy ({0})', inputs.resource_prefix || vars.RESOURCE_PREFIX || 'aws-dev-mn') }}

on:
  workflow_dispatch:
    inputs:
      resource_prefix:
        description: Environment/resource prefix used in names and state derivation
        required: false
        default: aws-dev-mn
        type: string
      vpc_id:
        description: VPC ID where the service will be deployed
        required: true
        type: string
      log_retention_in_days:
        description: CloudWatch log retention in days
        required: false
        default: "1"
        type: string
      export_strategy:
        description: Telemetry export path applied to traces and metrics in the effective contract
        required: false
        default: collector
        type: choice
        options:
          - collector
          - direct
      collector_endpoint:
        description: Optional collector OTLP base endpoint
        required: false
        default: ""
        type: string
      collector_traces_endpoint:
        description: Optional collector traces endpoint override
        required: false
        default: ""
        type: string
      collector_metrics_endpoint:
        description: Optional collector metrics endpoint override
        required: false
        default: ""
        type: string
      direct_endpoint:
        description: Optional direct OTLP base endpoint
        required: false
        default: ""
        type: string
      direct_traces_endpoint:
        description: Optional direct traces endpoint override
        required: false
        default: ""
        type: string
      direct_metrics_endpoint:
        description: Optional direct metrics endpoint override
        required: false
        default: ""
        type: string
jobs:
  observability:
    runs-on: ubuntu-latest
    environment: aws-dev
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
    outputs:
      validation_message: ${{ steps.contract-consumer.outputs.validation_message }}
      plan_json: ${{ steps.contract-consumer.outputs.plan_json }}
      managed_suite_enabled: ${{ steps.contract-consumer.outputs.managed_suite_enabled }}
      managed_suite_grafana_url: ${{ steps.contract-consumer.outputs.managed_suite_grafana_url }}
      managed_suite_otlp_http_endpoint: ${{ steps.contract-consumer.outputs.managed_suite_otlp_http_endpoint }}
      workload_dashboard_backend: ${{ steps.contract-consumer.outputs.workload_dashboard_backend }}
      workload_dashboard_uid: ${{ steps.contract-consumer.outputs.workload_dashboard_uid }}
      workload_dashboard_url: ${{ steps.contract-consumer.outputs.workload_dashboard_url }}
      effective_collector_endpoint: ${{ steps.contract-consumer.outputs.effective_collector_endpoint }}
      effective_collector_source: ${{ steps.contract-consumer.outputs.effective_collector_source }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}

      - name: Prepare effective observability contract
        env:
          SOURCE_CONTRACT_PATH: contracts/observability/observability-contract.yaml
          EFFECTIVE_CONTRACT_PATH: build/observability/observability-contract.effective.yaml
          EXPORT_STRATEGY_INPUT: ${{ inputs.export_strategy || 'collector' }}
        run: |
          set -euo pipefail
          mkdir -p build/observability
          cp "$SOURCE_CONTRACT_PATH" "$EFFECTIVE_CONTRACT_PATH"

          python3 - <<'PY'
          import os
          from pathlib import Path

          contract_path = Path(os.environ["EFFECTIVE_CONTRACT_PATH"])
          export_strategy = os.environ["EXPORT_STRATEGY_INPUT"].strip()
          if export_strategy not in {"collector", "direct"}:
            raise SystemExit(f"Unsupported export strategy: {export_strategy}")

          text = contract_path.read_text()
          text = text.replace("        ingestion: collector", f"        ingestion: {export_strategy}")
          text = text.replace("        ingestion: direct", f"        ingestion: {export_strategy}")
          contract_path.write_text(text)
          PY

      - name: Validate workflow input combination
        env:
          EXPORT_STRATEGY_INPUT: ${{ inputs.export_strategy || 'collector' }}
          COLLECTOR_ENDPOINT_INPUT: ${{ inputs.collector_endpoint || '' }}
          COLLECTOR_TRACES_ENDPOINT_INPUT: ${{ inputs.collector_traces_endpoint || '' }}
          COLLECTOR_METRICS_ENDPOINT_INPUT: ${{ inputs.collector_metrics_endpoint || '' }}
          DIRECT_ENDPOINT_INPUT: ${{ inputs.direct_endpoint || '' }}
          DIRECT_TRACES_ENDPOINT_INPUT: ${{ inputs.direct_traces_endpoint || '' }}
          DIRECT_METRICS_ENDPOINT_INPUT: ${{ inputs.direct_metrics_endpoint || '' }}
        run: |
          set -euo pipefail

          if [ "$EXPORT_STRATEGY_INPUT" = "direct" ] && { [ -n "$COLLECTOR_ENDPOINT_INPUT" ] || [ -n "$COLLECTOR_TRACES_ENDPOINT_INPUT" ] || [ -n "$COLLECTOR_METRICS_ENDPOINT_INPUT" ]; }; then
            echo "collector_* inputs cannot be combined with export_strategy=direct." >&2
            exit 1
          fi

          if [ "$EXPORT_STRATEGY_INPUT" = "collector" ] && { [ -n "$DIRECT_ENDPOINT_INPUT" ] || [ -n "$DIRECT_TRACES_ENDPOINT_INPUT" ] || [ -n "$DIRECT_METRICS_ENDPOINT_INPUT" ]; }; then
            echo "direct_* inputs cannot be combined with export_strategy=collector." >&2
            exit 1
          fi

      - name: Run contract consumer
        id: contract-consumer
        uses: pazfernando/workshop-idp-o11y/.github/actions/contract-consumer@main
        with:
          contract_path: build/observability/observability-contract.effective.yaml
          upload_artifacts: true
          generate_bindings: false
          collector_endpoint: ${{ inputs.collector_endpoint || '' }}
          collector_traces_endpoint: ${{ inputs.collector_traces_endpoint || '' }}
          collector_metrics_endpoint: ${{ inputs.collector_metrics_endpoint || '' }}
          direct_endpoint: ${{ inputs.direct_endpoint || '' }}
          direct_traces_endpoint: ${{ inputs.direct_traces_endpoint || '' }}
          direct_metrics_endpoint: ${{ inputs.direct_metrics_endpoint || '' }}
          deploy_managed_suite: false
          reuse_managed_suite: true
          aws_region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}

  deploy:
    needs:
      - observability
    runs-on: ubuntu-latest
    environment: aws-dev
    permissions:
      contents: read

    env:
      ENVIRONMENT_NAME: aws-dev
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
      STACK_NAME: ${{ vars.STACK_NAME != '' && vars.STACK_NAME || 'order-satellite-service' }}
      RESOURCE_PREFIX: ${{ inputs.resource_prefix || vars.RESOURCE_PREFIX || 'aws-dev-mn' }}
      VPC_ID: ${{ inputs.vpc_id }}
      LOG_RETENTION_IN_DAYS: ${{ inputs.log_retention_in_days || vars.LOG_RETENTION_IN_DAYS || '1' }}
      EXPORT_STRATEGY: ${{ inputs.export_strategy || vars.EXPORT_STRATEGY || 'collector' }}
      COLLECTOR_TRACES_ENDPOINT: ${{ inputs.collector_traces_endpoint || '' }}
      COLLECTOR_METRICS_ENDPOINT: ${{ inputs.collector_metrics_endpoint || '' }}
      DIRECT_ENDPOINT: ${{ inputs.direct_endpoint || '' }}
      DIRECT_TRACES_ENDPOINT: ${{ inputs.direct_traces_endpoint || '' }}
      DIRECT_METRICS_ENDPOINT: ${{ inputs.direct_metrics_endpoint || '' }}
      ORDER_API_BASE_URL: ${{ vars.ORDER_API_BASE_URL || 'https://z410yhtm4c.execute-api.us-east-1.amazonaws.com' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
      IMAGE_URI_PLACEHOLDER: public.ecr.aws/docker/library/eclipse-temurin:21-jre

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Validate VPC ID input
        run: |
          set -euo pipefail

          if [ -z "$VPC_ID" ]; then
            echo "VPC_ID is required. Provide workflow_dispatch input 'vpc_id'." >&2
            exit 1
          fi

          if [[ ! "$VPC_ID" =~ ^vpc-[0-9a-f]+$ ]]; then
            echo "VPC_ID must look like an AWS VPC ID, for example vpc-0123456789abcdef0." >&2
            exit 1
          fi

      - name: Resolve Terraform state backend
        run: |
          set -euo pipefail
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          EFFECTIVE_STACK_NAME="$STACK_NAME"
          if [ -n "$RESOURCE_PREFIX" ]; then
            EFFECTIVE_STACK_NAME="${RESOURCE_PREFIX}-${STACK_NAME}"
          fi

          PROJECT_SLUG="$(printf '%s' "$EFFECTIVE_STACK_NAME" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-')"
          PROJECT_SLUG="${PROJECT_SLUG#-}"
          PROJECT_SLUG="${PROJECT_SLUG%-}"

          if [ -n "$TF_STATE_BUCKET" ]; then
            BUCKET_NAME="$TF_STATE_BUCKET"
          else
            BUCKET_SUFFIX="${ACCOUNT_ID}-${AWS_REGION}-tfstate"
            MAX_BUCKET_LENGTH=63
            MAX_PROJECT_SLUG_LENGTH=$((MAX_BUCKET_LENGTH - ${#BUCKET_SUFFIX} - 1))
            PROJECT_HASH="$(printf '%s' "$PROJECT_SLUG" | shasum -a 256 | cut -c1-8)"

            if [ "$MAX_PROJECT_SLUG_LENGTH" -lt 10 ]; then
              echo "Unable to derive a valid Terraform state bucket name from STACK_NAME/RESOURCE_PREFIX." >&2
              exit 1
            fi

            if [ "${#PROJECT_SLUG}" -gt "$MAX_PROJECT_SLUG_LENGTH" ]; then
              TRUNCATED_LENGTH=$((MAX_PROJECT_SLUG_LENGTH - 9))
              PROJECT_SLUG="${PROJECT_SLUG:0:$TRUNCATED_LENGTH}-${PROJECT_HASH}"
              PROJECT_SLUG="${PROJECT_SLUG%-}"
            fi

            BUCKET_NAME="${PROJECT_SLUG}-${BUCKET_SUFFIX}"
          fi

          STATE_KEY="${TF_STATE_KEY:-${ENVIRONMENT_NAME}/${EFFECTIVE_STACK_NAME}.tfstate}"

          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Using existing Terraform state bucket: $BUCKET_NAME"
          else
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET_NAME"
            else
              aws s3api create-bucket \
                --bucket "$BUCKET_NAME" \
                --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi

            aws s3api put-bucket-versioning \
              --bucket "$BUCKET_NAME" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "$BUCKET_NAME" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

          {
            echo "TF_STATE_BUCKET=$BUCKET_NAME"
            echo "TF_STATE_KEY=$STATE_KEY"
          } >> "$GITHUB_ENV"

      - name: Initialize Terraform
        run: |
          terraform -chdir=infra/terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}"

      - name: Ensure ECR repository exists
        run: |
          set -euo pipefail

          EFFECTIVE_STACK_NAME="$STACK_NAME"
          if [ -n "$RESOURCE_PREFIX" ]; then
            EFFECTIVE_STACK_NAME="${RESOURCE_PREFIX}-${STACK_NAME}"
          fi

          ECR_REPOSITORY_NAME="$(printf '%s' "$EFFECTIVE_STACK_NAME" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-')"
          ECR_REPOSITORY_NAME="${ECR_REPOSITORY_NAME#-}"
          ECR_REPOSITORY_NAME="${ECR_REPOSITORY_NAME%-}/app"

          # Create ECR repository if it doesn't exist (via AWS CLI, not Terraform yet)
          if ! aws ecr describe-repositories --repository-names "$ECR_REPOSITORY_NAME" >/dev/null 2>&1; then
            echo "Creating ECR repository: $ECR_REPOSITORY_NAME"
            aws ecr create-repository \
              --repository-name "$ECR_REPOSITORY_NAME" \
              --image-scanning-configuration scanOnPush=true
          fi

          # Derive repository URL
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REPOSITORY_URL="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY_NAME}"

          echo "ECR_REPOSITORY_NAME=$ECR_REPOSITORY_NAME" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_URL=$ECR_REPOSITORY_URL" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_URL=$ECR_REPOSITORY_URL"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container image
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REPOSITORY_URL}:${GITHUB_SHA}"
          docker build --pull -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy ECS/Fargate stack
        env:
          EFFECTIVE_COLLECTOR_ENDPOINT: ${{ needs.observability.outputs.effective_collector_endpoint }}
        run: |
          terraform -chdir=infra/terraform apply \
            -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="stack_name=${STACK_NAME}" \
            -var="resource_prefix=${RESOURCE_PREFIX}" \
            -var="image_uri=${IMAGE_URI}" \
            -var="order_api_base_url=${ORDER_API_BASE_URL}" \
            -var="log_retention_in_days=${LOG_RETENTION_IN_DAYS}" \
            -var="vpc_id=${VPC_ID}" \
            -var="instrumentation_mode=javaagent" \
            -var="export_strategy=${EXPORT_STRATEGY}" \
            -var="collector_endpoint=${EFFECTIVE_COLLECTOR_ENDPOINT}" \
            -var="collector_traces_endpoint=${COLLECTOR_TRACES_ENDPOINT}" \
            -var="collector_metrics_endpoint=${COLLECTOR_METRICS_ENDPOINT}" \
            -var="direct_endpoint=${DIRECT_ENDPOINT}" \
            -var="direct_traces_endpoint=${DIRECT_TRACES_ENDPOINT}" \
            -var="direct_metrics_endpoint=${DIRECT_METRICS_ENDPOINT}"

      - name: Publish deployment summary
        run: |
          {
            echo "## Deployment"
            echo ""
            echo "- App URL: $(terraform -chdir=infra/terraform output -raw app_url)"
            echo "- ECS cluster: $(terraform -chdir=infra/terraform output -raw ecs_cluster_name)"
            echo "- ECS service: $(terraform -chdir=infra/terraform output -raw ecs_service_name)"
            echo "- CloudWatch log group: $(terraform -chdir=infra/terraform output -raw log_group_name)"
            echo "- Observability collector source: ${{ needs.observability.outputs.effective_collector_source }}"
            echo "- Workload dashboard: ${{ needs.observability.outputs.workload_dashboard_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
